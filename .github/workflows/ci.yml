name: CI

on:
  push:
    branches: [main, dev, feature/*]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      MONGO_URI: ${{ vars.MONGO_URI }}
      MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
      MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
      MONGO_DB_NAME: ${{ vars.MONGO_DB_NAME }}
      MONGO_COLLECTION_NAME: ${{ vars.MONGO_COLLECTION_NAME }}
      ENV_NAME: ${{ vars.ENV_NAME }}
      API_PORT: ${{ vars.API_PORT }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
      RATE_LIMIT: ${{ vars.RATE_LIMIT }}
      RATE_LIMIT_WINDOW: ${{ vars.RATE_LIMIT_WINDOW }}

    steps:
      - uses: actions/checkout@v6

      - name: Create .env file from GitHub secrets and vars
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "MONGO_USERNAME=${{ secrets.MONGO_USERNAME }}" >> .env
          echo "MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}" >> .env
          echo "ENV_NAME=${{ vars.ENV_NAME }}" >> .env
          echo "LOG_LEVEL=${{ vars.LOG_LEVEL }}" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Build app image
        run: docker compose build

      - name: Show MongoDB connection details
        run: |
          echo "MONGO_URI: ${{ vars.MONGO_URI }}"
          echo "MONGO_DB_NAME: ${{ vars.MONGO_DB_NAME }}
          echo "MONGO_COLLECTION_NAME: ${{ vars.MONGO_COLLECTION_NAME }}
          echo ".env file contents:"
          cat .env

      - name: Run tests with coverage
        run: docker compose run --rm app pytest --cov=src --cov-fail-under=80

      - name: Show coverage report
        run: docker compose run --rm app pytest --cov=src --cov-report=term-missing

      - name: Clean up
        run: docker compose down -v
