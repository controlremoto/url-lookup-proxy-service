services:
  app:
    build: .
    container_name: url-lookup-app
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=urllookup
      - MONGO_COLLECTION_NAME=urls
      - MONGO_USERNAME=${MONGO_USERNAME}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - ENV_NAME=${ENV_NAME:-local}
      - API_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL}
      - RATE_LIMIT=10
      - RATE_LIMIT_WINDOW=60
      - PYTHONPATH=:/app/src
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
  mongo:
    image: mongo:6.0
    container_name: url-lookup-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/mongo/27017"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  mongo_data:
